<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Robo Sweep!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2246%22 fill=%22%2345cdbb%22/><circle cx=%2250%22 cy=%2248%22 r=%2220%22 fill=%22%231f2734%22/><circle cx=%2242%22 cy=%2246%22 r=%225%22 fill=%22%23a5ecff%22/><circle cx=%2258%22 cy=%2246%22 r=%225%22 fill=%22%23a5ecff%22/><path d=%22M14 32 A46 46 0 0 1 86 32 L78 44 A38 38 0 0 0 22 44 Z%22 fill=%22%232b8377%22/></svg>" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1424;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: radial-gradient(ellipse at 50% 40%, #2d2440 0%, #1a1424 70%);
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-bot {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(145deg, #5eead4, #14b8a6);
      box-shadow: 0 10px 40px rgba(94, 234, 212, 0.4), inset 0 -8px 16px rgba(0,0,0,0.15);
      position: relative;
      animation: botSpin 1.6s ease-in-out infinite;
    }
    .loading-bot::before {
      content: '';
      position: absolute;
      top: 26px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #0f766e;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
    }
    .loading-bot::after {
      content: '';
      position: absolute;
      top: 38px; left: 50%;
      transform: translateX(-50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fbbf24;
      box-shadow: 0 0 16px 4px rgba(251, 191, 36, 0.7);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes botSpin {
      0%, 100% { transform: rotate(-14deg) scale(1); }
      50% { transform: rotate(14deg) scale(1.06); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .loading-dots { display: flex; gap: 12px; }
    .loading-dots span {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #f472b6;
      animation: dotHop 1s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { background: #fbbf24; animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { background: #5eead4; animation-delay: 0.3s; }
    @keyframes dotHop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="loading">
    <div class="loading-bot"></div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
